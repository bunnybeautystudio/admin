<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--tp:#A89880;--tpl:#C4B5A2;--cr:#F5F0EA;--dk:#2C2520;--red:#C0392B;--grn:#4A7A45;--bg:#F7F3EF;--bs-bg:#FDFCF8;--bs-line:#C8C0B0}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Noto Sans SC',sans-serif}
#app{max-width:430px;margin:0 auto;height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;transition:transform .28s cubic-bezier(.4,0,.2,1),opacity .28s;background:var(--bg)}
.screen.off{pointer-events:none;opacity:0;transform:translateY(20px)}
/* TOPBAR */
.topbar{padding:env(safe-area-inset-top,14px) 18px 10px;background:var(--tp);display:flex;align-items:flex-end;justify-content:space-between;flex-shrink:0}
.topbar-l{display:flex;align-items:center;gap:10px}
.logo-box{width:34px;height:34px;border:1px solid rgba(255,255,255,.4);border-radius:8px;display:grid;place-items:center;flex-shrink:0}
.logo-box .lo{font-size:7px;letter-spacing:.1em;opacity:.7;font-family:'Playfair Display',serif;color:#fff;display:block;text-align:center}
.logo-box .lb{font-size:12px;font-family:'Playfair Display',serif;font-weight:500;color:#fff;display:block;text-align:center}
.brand-name{font-family:'Playfair Display',serif;font-size:15px;color:#fff}
.brand-sub{font-size:9px;letter-spacing:.13em;opacity:.6;text-transform:uppercase;font-family:'Noto Sans SC',sans-serif;color:#fff;margin-top:1px}
.icon-btn{background:rgba(255,255,255,.15);border:none;border-radius:50%;width:34px;height:34px;display:grid;place-items:center;cursor:pointer;color:#fff;font-size:14px}
/* NAV */
#bnav{background:#fff;border-top:1px solid #EDE9E4;display:flex;padding-bottom:env(safe-area-inset-bottom,0);flex-shrink:0;z-index:10}
.btab{flex:1;padding:9px 4px 7px;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;cursor:pointer;position:relative}
.btab-i{font-size:19px;line-height:1}
.btab-l{font-size:9px;letter-spacing:.04em;color:#bbb;font-family:'Noto Sans SC',sans-serif}
.btab.on .btab-l{color:var(--tp);font-weight:500}
.btab.on::after{content:'';position:absolute;top:0;left:25%;right:25%;height:2px;background:var(--tp);border-radius:0 0 2px 2px}
#fab{position:absolute;bottom:calc(58px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);background:var(--dk);color:#fff;border:none;border-radius:28px;padding:13px 26px;font-size:14px;font-weight:500;font-family:'Noto Sans SC',sans-serif;cursor:pointer;box-shadow:0 4px 20px rgba(44,37,32,.35);z-index:9;white-space:nowrap;letter-spacing:.04em}

/* ── HOME ── */
#home{background:var(--tp)}
.period-toggle{display:flex;background:rgba(255,255,255,.15);border-radius:12px;padding:3px;margin:0 16px 14px;gap:3px;flex-shrink:0}
.pt{flex:1;padding:9px 4px;border-radius:9px;border:none;background:transparent;font-size:12px;font-family:'Noto Sans SC',sans-serif;color:rgba(255,255,255,.65);cursor:pointer;transition:all .2s;letter-spacing:.03em}
.pt.on{background:rgba(255,255,255,.25);color:#fff;font-weight:500}
.day-nav{display:flex;align-items:center;justify-content:space-between;padding:2px 8px 12px;flex-shrink:0}
.day-nav button{background:rgba(255,255,255,.12);border:none;color:#fff;width:38px;height:38px;border-radius:50%;font-size:20px;cursor:pointer;display:grid;place-items:center}
.day-info .dn{font-family:'Playfair Display',serif;font-size:18px;color:#fff;text-align:center}
.day-info .ds{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-top:2px;text-align:center}
.sum-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px 16px;flex-shrink:0}
.sum-card{background:rgba(255,255,255,.18);border-radius:16px;padding:13px 13px 11px}
.sc-l{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:4px}
.sc-v{font-family:'Playfair Display',serif;font-size:22px;color:#fff}
.sc-v.red{color:#ffb3b3}
.sc-sub{font-size:10px;color:rgba(255,255,255,.45);margin-top:2px}
.home-body{background:#fff;border-radius:26px 26px 0 0;padding:18px 16px 100px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sec-hdr{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--tpl);margin-bottom:10px}
.empty-state{text-align:center;padding:36px 0}
.empty-state .ei{font-size:36px;margin-bottom:10px}
.empty-state p{font-family:'Playfair Display',serif;font-style:italic;font-size:14px;color:#ccc}
.empty-state small{font-size:10px;color:#ddd;letter-spacing:.08em;text-transform:uppercase;display:block;margin-top:4px}
.rec-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:.5px solid #F0EBE4}
.rec-item:last-child{border:none}
.rec-icon{width:40px;height:40px;border-radius:13px;display:grid;place-items:center;font-size:17px;flex-shrink:0}
.rec-icon.inc{background:#EAF2EA}.rec-icon.exp{background:#FAEAEA}
.rec-body{flex:1;min-width:0}
.rec-title{font-size:13px;font-weight:500;color:var(--dk);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rec-meta{display:flex;align-items:center;gap:5px;margin-top:3px;flex-wrap:wrap}
.rec-date{font-size:10px;color:#ccc}
.badge{display:inline-block;padding:1px 7px;border-radius:20px;font-size:9px;letter-spacing:.04em;text-transform:uppercase;font-weight:500}
.b-cash{background:#EAF0E4;color:#5A7A45}.b-emt{background:#E4EAF0;color:#45607A}.b-rmb{background:#F0EAE4;color:#7A6045}.b-new{background:#F0E4F0;color:#7A457A}.b-other{background:#F0F0F0;color:#888}
.rec-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.rec-amt{font-family:'Playfair Display',serif;font-size:16px}
.rec-amt.inc{color:var(--dk)}.rec-amt.exp{color:var(--red)}
.rec-actions{display:flex;gap:4px}
.ra{width:26px;height:26px;border-radius:50%;border:none;display:grid;place-items:center;cursor:pointer;font-size:11px}
.ra.edit{background:#F5F0EA;color:var(--tp)}.ra.del{background:#FFF0F0;color:var(--red)}

/* ── STATS ── */
#stats{overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--cr)}
.stats-scroll{padding:14px 14px 90px}
.per-tabs2{display:flex;background:#fff;border-radius:13px;padding:3px;margin-bottom:12px;gap:3px}
.per-tab2{flex:1;padding:9px 4px;border-radius:10px;border:none;background:transparent;font-size:11px;font-family:'Noto Sans SC',sans-serif;color:#bbb;cursor:pointer;transition:all .2s}
.per-tab2.on{background:var(--dk);color:#fff}
.date-range{display:flex;gap:6px;align-items:center;margin-bottom:12px}
.date-range input{flex:1;padding:9px 12px;border-radius:11px;border:1.5px solid #E0D8D0;font-size:12px;color:var(--dk);background:#fff;outline:none;-webkit-appearance:none}
.date-range button{padding:9px 13px;border-radius:11px;background:var(--dk);color:#fff;border:none;font-size:12px;font-family:'Noto Sans SC',sans-serif;cursor:pointer}
.stat-card{background:#fff;border-radius:18px;padding:14px;margin-bottom:10px}
.stat-card-title{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--tpl);margin-bottom:11px}
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}
.kpi{background:#fff;border-radius:14px;padding:12px 6px;text-align:center}
.kpi-v{font-family:'Playfair Display',serif;font-size:20px;color:var(--dk);line-height:1}
.kpi-l{font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:#bbb;margin-top:3px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}.bar-row:last-child{margin-bottom:0}
.bar-lbl{font-size:11px;color:var(--dk);width:54px;flex-shrink:0}
.bar-track{flex:1;background:#F0EBE4;border-radius:6px;height:7px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transition:width .6s ease}
.bar-num{font-size:11px;color:#bbb;width:22px;text-align:right;flex-shrink:0}

/* ── BALANCE SHEET ── */
#ledger{display:flex;flex-direction:column;overflow:hidden}
.led-topbar{background:#fff;border-bottom:1px solid #EDE9E4;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.led-mth-nav{display:flex;align-items:center;gap:6px}
.led-mth-nav button{background:#F5F0EA;border:none;border-radius:50%;width:30px;height:30px;display:grid;place-items:center;cursor:pointer;font-size:16px;color:var(--tp)}
.led-mth{font-family:'Playfair Display',serif;font-size:16px;color:var(--dk);min-width:100px;text-align:center}
.led-actions{display:flex;gap:6px}
.led-btn{background:#F5F0EA;border:none;border-radius:10px;padding:7px 11px;font-size:12px;font-family:'Noto Sans SC',sans-serif;cursor:pointer;color:var(--dk);white-space:nowrap}
.led-btn.primary{background:var(--dk);color:#fff}
.led-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 90px}

/* ── BALANCE SHEET STYLE ── */
.bs-wrap{padding:16px}
.bs-header{text-align:center;margin-bottom:18px;padding-bottom:12px;border-bottom:2px solid var(--dk)}
.bs-company{font-family:'Playfair Display',serif;font-size:18px;color:var(--dk);font-weight:500}
.bs-title{font-size:12px;color:#888;margin-top:3px;letter-spacing:.05em}
.bs-period{font-size:11px;color:var(--tpl);margin-top:2px;font-style:italic}
.bs-section{margin-bottom:14px}
.bs-section-title{font-size:13px;font-weight:700;color:var(--dk);letter-spacing:.06em;text-transform:uppercase;padding:6px 0 8px;border-bottom:1px solid var(--dk);margin-bottom:4px}
.bs-row{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;border-bottom:.5px solid #EDE9E4}
.bs-row:last-of-type{border-bottom:none}
.bs-row .bs-lbl{font-size:13px;color:#444;padding-left:12px}
.bs-row .bs-lbl.indent{padding-left:24px;color:#666}
.bs-row .bs-val{font-size:13px;color:var(--dk);min-width:70px;text-align:right}
.bs-subtotal{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0 4px;margin-top:2px}
.bs-subtotal .bs-lbl{font-size:13px;font-weight:600;color:var(--dk);padding-left:12px}
.bs-subtotal .bs-val{font-size:13px;font-weight:600;color:var(--dk);min-width:70px;text-align:right;border-bottom:1px solid var(--dk);padding-bottom:2px}
.bs-total{display:flex;justify-content:space-between;align-items:baseline;padding:10px 0;border-top:2px solid var(--dk);border-bottom:2px solid var(--dk);margin-top:4px}
.bs-total .bs-lbl{font-size:14px;font-weight:700;color:var(--dk);font-family:'Playfair Display',serif}
.bs-total .bs-val{font-size:15px;font-weight:700;color:var(--dk);font-family:'Playfair Display',serif;min-width:70px;text-align:right}
.bs-total .bs-val.pos{color:var(--grn)}.bs-total .bs-val.neg{color:var(--red)}
.bs-divider{height:1px;background:#EDE9E4;margin:14px 0}
.bs-note{font-size:10px;color:#bbb;text-align:center;margin-top:8px;font-style:italic}
.bs-empty{text-align:center;padding:50px 0}
.bs-empty .ei{font-size:42px;margin-bottom:12px}
.bs-empty p{font-family:'Playfair Display',serif;font-style:italic;color:#ccc;font-size:14px}
.pay-breakdown{display:flex;gap:8px;padding:4px 12px 8px;flex-wrap:wrap}
.pb-chip{background:var(--cr);border-radius:8px;padding:5px 10px;font-size:11px;color:#666}
.pb-chip span{font-weight:600;color:var(--dk)}

/* ── FORM SHEET ── */
#formSheet{position:absolute;inset:0;z-index:30;display:flex;flex-direction:column;justify-content:flex-end;pointer-events:none}
#formSheet.open{pointer-events:all}
.sheet-bg{position:absolute;inset:0;background:rgba(44,37,32,0);transition:background .3s}
#formSheet.open .sheet-bg{background:rgba(44,37,32,.45)}
.sheet-body{background:#fff;border-radius:26px 26px 0 0;padding:0 20px calc(env(safe-area-inset-bottom,0px)+22px);max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);position:relative;z-index:1}
#formSheet.open .sheet-body{transform:translateY(0)}
.sheet-handle{width:38px;height:4px;background:#E0D8D0;border-radius:2px;margin:12px auto 18px}
.sheet-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.back-link{background:none;border:none;font-size:12px;color:#bbb;cursor:pointer;font-family:'Noto Sans SC',sans-serif;display:flex;align-items:center;gap:3px;padding:0}
.close-btn{background:#F5F0EA;border:none;border-radius:50%;width:32px;height:32px;display:grid;place-items:center;cursor:pointer;font-size:15px;color:#999}
.step-prog{display:flex;gap:4px;justify-content:center;margin-bottom:18px}
.sp{width:6px;height:6px;border-radius:50%;background:#E0D8D0;transition:all .25s}
.sp.on{background:var(--tp);width:18px;border-radius:3px}
.step-q{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--tpl);text-align:center;margin-bottom:5px}
.step-title{font-family:'Playfair Display',serif;font-size:21px;font-weight:400;color:var(--dk);text-align:center;margin-bottom:18px}
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:4px}
.type-card{border:1.5px solid #E0D8D0;border-radius:18px;padding:22px 10px;text-align:center;cursor:pointer;transition:all .15s;background:#fff}
.type-card .tc-i{font-size:30px;margin-bottom:8px}
.type-card .tc-l{font-size:15px;font-weight:500;color:var(--dk)}
.type-card .tc-s{font-size:10px;color:#bbb;margin-top:3px}
.type-card.sel-inc{background:#EAF2EA;border-color:var(--grn)}
.type-card.sel-exp{background:#FAEAEA;border-color:var(--red)}
.choice-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.choice{border:1.5px solid #E0D8D0;border-radius:15px;padding:17px 10px;text-align:center;cursor:pointer;transition:all .15s;background:#fff}
.choice .c-main{font-size:14px;font-weight:500;color:var(--dk)}
.choice .c-sub{font-size:10px;color:#bbb;margin-top:2px;font-style:italic;font-family:'Playfair Display',serif}
.choice.on{background:var(--tp);border-color:var(--tp)}
.choice.on .c-main,.choice.on .c-sub{color:#fff}
.amt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.amt-pill{border:1.5px solid #E0D8D0;border-radius:13px;padding:15px 4px;text-align:center;cursor:pointer;font-size:14px;font-weight:500;color:var(--dk);transition:all .15s;background:#fff}
.amt-pill.on{background:var(--tp);border-color:var(--tp);color:#fff}
.cat-list{display:flex;flex-direction:column;gap:7px;margin-bottom:10px}
.cat-item{border:1.5px solid #E0D8D0;border-radius:13px;padding:13px 16px;cursor:pointer;font-size:13px;color:var(--dk);transition:all .15s;background:#fff;display:flex;align-items:center;gap:10px}
.cat-item.on{background:var(--tp);border-color:var(--tp);color:#fff}
.pay-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.pay-btn{border:1.5px solid #E0D8D0;border-radius:13px;padding:15px 6px;text-align:center;cursor:pointer;transition:all .15s;background:#fff}
.pay-btn .pb-m{font-size:13px;font-weight:500;color:var(--dk)}
.pay-btn .pb-s{font-size:9px;color:#bbb;margin-top:2px}
.pay-btn.on{background:var(--tp);border-color:var(--tp)}
.pay-btn.on .pb-m,.pay-btn.on .pb-s{color:#fff}
.custom-row{display:flex;gap:8px;align-items:center;margin-top:4px}
.amt-input{padding:13px 16px;border-radius:13px;border:1.5px solid #E0D8D0;font-size:15px;color:var(--dk);background:#fff;outline:none;font-family:'Noto Sans SC',sans-serif;-webkit-appearance:none;flex:1}
.amt-input:focus{border-color:var(--tp)}
.note-input{width:100%;padding:13px 16px;border-radius:13px;border:1.5px solid #E0D8D0;font-size:13px;color:var(--dk);background:#fff;outline:none;font-family:'Noto Sans SC',sans-serif;resize:none;height:72px}
.note-input:focus{border-color:var(--tp)}
.confirm-card{background:var(--cr);border-radius:16px;padding:14px 16px;margin-bottom:14px}
.cc-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:.5px solid #EAE4DC}
.cc-row:last-child{border:none;padding-bottom:0}
.cc-l{font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:#bbb}
.cc-v{font-size:13px;font-weight:500;color:var(--dk)}
.big-btn{width:100%;padding:15px;border-radius:15px;font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:'Noto Sans SC',sans-serif;letter-spacing:.04em;margin-top:6px}
.big-btn.primary{background:var(--dk);color:#fff}
.big-btn.primary:disabled{opacity:.4}
.big-btn.ghost{background:transparent;color:#bbb;border:1.5px solid #E0D8D0}
.success-view{text-align:center;padding:18px 0 8px}
.ok-circle{width:60px;height:60px;border-radius:50%;border:2px solid var(--tp);display:grid;place-items:center;margin:0 auto 14px;color:var(--tp);font-size:22px}
.ok-amt{font-family:'Playfair Display',serif;font-size:30px;margin-bottom:4px}
.ok-sub{font-size:11px;color:#bbb;margin-bottom:22px}
/* DIALOG */
.dialog-wrap{position:absolute;inset:0;z-index:40;display:none;align-items:flex-end;justify-content:center}
.dialog-wrap.open{display:flex}
.dialog-bg{position:absolute;inset:0;background:rgba(0,0,0,.4)}
.dialog{background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:430px;padding:22px 20px calc(env(safe-area-inset-bottom,0px)+22px);position:relative;z-index:1}
.dialog h3{font-family:'Playfair Display',serif;font-size:17px;font-weight:400;color:var(--dk);margin-bottom:5px}
.dialog p{font-size:12px;color:#aaa;margin-bottom:18px}
.dialog-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.dialog-btns button{padding:13px;border-radius:13px;font-size:13px;font-family:'Noto Sans SC',sans-serif;cursor:pointer;border:none}
.d-cancel{background:#F5F0EA;color:var(--dk)}.d-confirm{background:var(--red);color:#fff}
</style>

<div id="app">
  <!-- HOME -->
  <div id="home" class="screen">
    <div class="topbar">
      <div class="topbar-l">
        <div class="logo-box"><span class="lo">00</span><span class="lb">BB</span></div>
        <div><div class="brand-name">Bunny Beauty</div><div class="brand-sub">Studio Tracker</div></div>
      </div>
      <button class="icon-btn" id="settingsBtn">⚙</button>
    </div>
    <div class="period-toggle" id="periodToggle">
      <button class="pt on" data-p="today">今天</button>
      <button class="pt" data-p="week">本周</button>
      <button class="pt" data-p="month">本月</button>
    </div>
    <div class="day-nav" id="dayNav">
      <button id="prevDay">‹</button>
      <div class="day-info"><div class="dn" id="dayDisp"></div><div class="ds" id="daySub"></div></div>
      <button id="nextDay">›</button>
    </div>
    <div class="sum-cards" id="sumCards"></div>
    <div class="home-body">
      <div class="sec-hdr" id="recSectionTitle"></div>
      <div id="recList"></div>
    </div>
  </div>

  <!-- STATS -->
  <div id="stats" class="screen off">
    <div class="topbar" style="padding-top:env(safe-area-inset-top,14px)">
      <div class="topbar-l"><div class="brand-name">统计</div></div>
    </div>
    <div class="stats-scroll">
      <div class="per-tabs2" id="perTabs">
        <button class="per-tab2 on" data-p="week">本周</button>
        <button class="per-tab2" data-p="month">本月</button>
        <button class="per-tab2" data-p="custom">自定义</button>
      </div>
      <div class="date-range" id="dateRange" style="display:none">
        <input type="date" id="cStart"/><span style="color:#ccc">→</span><input type="date" id="cEnd"/>
        <button id="cQuery">查询</button>
      </div>
      <div id="statsContent"></div>
    </div>
  </div>

  <!-- LEDGER -->
  <div id="ledger" class="screen off">
    <div class="topbar" style="padding-top:env(safe-area-inset-top,14px)">
      <div class="topbar-l"><div class="brand-name">Balance Sheet</div></div>
    </div>
    <div class="led-topbar">
      <div class="led-mth-nav">
        <button id="ledPrev">‹</button>
        <div class="led-mth" id="ledMth"></div>
        <button id="ledNext">›</button>
      </div>
      <div class="led-actions">
        <button class="led-btn" id="syncBtn">☁ Sheets</button>
        <button class="led-btn primary" id="dlBtn">⬇ Excel</button>
      </div>
    </div>
    <div class="led-scroll"><div id="bsContent"></div></div>
  </div>

  <div id="bnav">
    <button class="btab on" data-sc="home"><div class="btab-i">📒</div><div class="btab-l">记账</div></button>
    <button class="btab" data-sc="stats"><div class="btab-i">📊</div><div class="btab-l">统计</div></button>
    <button class="btab" data-sc="ledger"><div class="btab-i">📋</div><div class="btab-l">账本</div></button>
  </div>
  <button id="fab">＋ 记录</button>

  <div id="formSheet">
    <div class="sheet-bg" id="sheetBg"></div>
    <div class="sheet-body" id="sheetBody"></div>
  </div>
  <div class="dialog-wrap" id="dialogWrap">
    <div class="dialog-bg" id="dialogBg"></div>
    <div class="dialog"><h3>确认删除</h3><p id="dialogDesc"></p>
      <div class="dialog-btns"><button class="d-cancel" id="dlgNo">取消</button><button class="d-confirm" id="dlgYes">删除</button></div>
    </div>
  </div>
</div>

<script>
const MS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS=['日','一','二','三','四','五','六'];
const AMTS_INC=[20,40,45,50,60],AMTS_EXP=[10,20,30,50,100];
const CATS=[['🧴','睫毛材料'],['🔧','工具设备'],['🏠','房租场地'],['📣','广告推广'],['🚗','交通'],['📦','其他']];
const PAYS=['Cash','EMT','RMB'];
const PAY_CN={Cash:'现金',EMT:'电子转账',RMB:'人民币'};
const PAYBADGE={Cash:'b-cash',EMT:'b-emt',RMB:'b-rmb'};

let gsUrl='',fstep=0,editMode=false,editId=null,editDate=null,statPer='week';
let viewDate=new Date(),ledDate=new Date(),homePeriod='today',cStart=null,cEnd=null,delCb=null;
let form={type:'',service:'',customer:'',category:'',note:'',amount:'',payment:''};

const q=id=>document.getElementById(id);
function pad(n){return String(n).padStart(2,'0');}
function td(d=new Date()){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function parseD(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function fmtD(d){return d.getDate()+' '+MS[d.getMonth()]+' '+d.getFullYear();}
function fmtShort(d){return d?d.slice(5).replace('-','/'):'—';}
function mthLabel(d){return MS[d.getMonth()]+' '+d.getFullYear();}
function isToday(d){return td(d)===td();}
function dKey(d){return 'bb:r:'+td(d);}
function nowT(){const n=new Date();return pad(n.getHours())+':'+pad(n.getMinutes());}
function amtN(s){return parseFloat((s||'').replace(/[$¥+\-]/g,''))||0;}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function daysInMonth(d){return new Date(d.getFullYear(),d.getMonth()+1,0).getDate();}
function fmt$(n){return '$'+n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}

async function loadRecs(d){try{const r=await window.storage.get(dKey(d));return r&&r.value?JSON.parse(r.value):[];}catch{return[];}}
async function saveRecs(d,recs){try{await window.storage.set(dKey(d),JSON.stringify(recs));}catch{}}
async function addRec(d,rec){const recs=await loadRecs(d);recs.push({...rec,_id:uid()});await saveRecs(d,recs);}
async function updRec(d,id,rec){await saveRecs(d,(await loadRecs(d)).map(r=>r._id===id?{...rec,_id:id}:r));}
async function delRec(d,id){await saveRecs(d,(await loadRecs(d)).filter(r=>r._id!==id));}

function weekRange(d=new Date()){const dy=d.getDay(),df=dy===0?-6:1-dy,m=new Date(d.getFullYear(),d.getMonth(),d.getDate()+df);return[m,new Date(m.getFullYear(),m.getMonth(),m.getDate()+6)];}
function monthRange(d=new Date()){return[new Date(d.getFullYear(),d.getMonth(),1),new Date(d.getFullYear(),d.getMonth()+1,0)];}

async function getPeriodRecs(){
  if(homePeriod==='today')return await loadRecs(viewDate);
  let s,e;
  if(homePeriod==='week')[s,e]=weekRange(viewDate);
  else [s,e]=monthRange(viewDate);
  const all=[],d=new Date(s),end=new Date(e);
  while(d<=end){(await loadRecs(new Date(d))).forEach(r=>all.push({...r,_d:td(new Date(d))}));d.setDate(d.getDate()+1);}
  return all;
}
async function rangeRecs(s,e){const all=[],d=new Date(s),end=new Date(e);while(d<=end){(await loadRecs(new Date(d))).forEach(r=>all.push({...r,_d:td(new Date(d))}));d.setDate(d.getDate()+1);}return all;}
async function monthRecs(d){const all=[],n=daysInMonth(d);for(let i=1;i<=n;i++){const dd=new Date(d.getFullYear(),d.getMonth(),i);(await loadRecs(dd)).forEach(r=>all.push({...r,_d:td(dd)}));}return all;}

function calcTotals(recs){
  let inc=0,exp=0,cash=0,emt=0,rmb=0;
  const bySvc={},byCat={};
  recs.forEach(r=>{
    if(r.type==='expense'){exp+=amtN(r.amount);byCat[r.category||'其他']=(byCat[r.category||'其他']||0)+amtN(r.amount);}
    else{const a=amtN(r.amount);inc+=a;if(r.payment==='Cash')cash+=a;else if(r.payment==='EMT')emt+=a;else if(r.payment==='RMB')rmb+=a;bySvc[r.service||'服务']=(bySvc[r.service||'服务']||0)+a;}
  });
  return{inc,exp,cash,emt,rmb,bal:inc-exp,bySvc,byCat};
}

// ── NAV ──
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('off',s.id!==id));
  document.querySelectorAll('.btab').forEach(t=>t.classList.toggle('on',t.dataset.sc===id));
  q('fab').style.display=id==='home'?'block':'none';
  if(id==='home')renderHome();
  if(id==='stats')renderStats();
  if(id==='ledger')renderLedger();
}

// ── DIALOG ──
function openDialog(desc,cb){q('dialogDesc').textContent=desc;q('dialogWrap').classList.add('open');delCb=cb;}
q('dlgNo').onclick=q('dialogBg').onclick=()=>q('dialogWrap').classList.remove('open');
q('dlgYes').onclick=()=>{q('dialogWrap').classList.remove('open');delCb&&delCb();};

// ── HOME ──
function getPeriodLabel(){
  if(homePeriod==='today')return{main:fmtD(viewDate),sub:isToday(viewDate)?'今天':'历史记录'};
  if(homePeriod==='week'){const[s,e]=weekRange(viewDate);return{main:`${fmtShort(td(s))} — ${fmtShort(td(e))}`,sub:'本周'};}
  return{main:mthLabel(viewDate),sub:'本月'};
}

async function renderHome(){
  const recs=await getPeriodRecs();
  const{main,sub}=getPeriodLabel();
  q('dayDisp').textContent=main;q('daySub').textContent=sub;
  // Show/hide day nav
  q('dayNav').style.display=homePeriod==='today'?'flex':'none';
  // Sum
  const{inc,exp,cash,emt,rmb}=calcTotals(recs);
  const cnt=recs.filter(r=>r.type!=='expense').length;
  const expCnt=recs.filter(r=>r.type==='expense').length;
  q('sumCards').innerHTML=`
    <div class="sum-card"><div class="sc-l">收入</div><div class="sc-v">${fmt$(inc)}</div><div class="sc-sub">${cnt}笔服务</div></div>
    <div class="sum-card"><div class="sc-l">支出</div><div class="sc-v ${exp>0?'red':''}">${fmt$(exp)}</div><div class="sc-sub">结余 ${fmt$(inc-exp)}</div></div>`;
  q('recSectionTitle').textContent=recs.length?`${recs.length} 条记录`:'';
  if(!recs.length){q('recList').innerHTML='<div class="empty-state"><div class="ei">✨</div><p>暂无记录</p><small>点击 ＋ 开始</small></div>';return;}
  // Sort newest first
  const sorted=[...recs].sort((a,b)=>{const da=a._d||td(viewDate),db=b._d||td(viewDate);return db.localeCompare(da)||((b.time||'').localeCompare(a.time||''));});
  q('recList').innerHTML=sorted.map(r=>{
    const isExp=r.type==='expense';
    const title=isExp?(r.category||'支出'):`${r.service}`;
    const sub2=isExp?`<span class="badge b-other">${r.payment}</span>${r.note?'<span style="font-size:10px;color:#bbb">'+r.note+'</span>':''}`:`<span class="badge ${PAYBADGE[r.payment]||''}">${r.payment}</span>${r.customer==='New'?'<span class="badge b-new">新客</span>':''}`;
    const dateLabel=r._d&&r._d!==td(viewDate)?`<span class="rec-date">${fmtShort(r._d)}</span>`:'';
    return`<div class="rec-item"><div class="rec-icon ${isExp?'exp':'inc'}">${isExp?'💸':'💰'}</div>
      <div class="rec-body"><div class="rec-title">${title}${isExp?'':' · '+r.customer}</div><div class="rec-meta">${dateLabel}${r.time?`<span class="rec-date">${r.time}</span>`:''}${sub2}</div></div>
      <div class="rec-right"><div class="rec-amt ${isExp?'exp':'inc'}">${isExp?'-':''}${r.amount}</div><div class="rec-actions"><button class="ra edit" data-id="${r._id}" data-d="${r._d||td(viewDate)}" data-act="edit">✏️</button><button class="ra del" data-id="${r._id}" data-d="${r._d||td(viewDate)}" data-act="del">×</button></div></div>
    </div>`;
  }).join('');
  q('recList').querySelectorAll('.ra').forEach(btn=>btn.addEventListener('click',async function(){
    const id=this.dataset.id,act=this.dataset.act,d=parseD(this.dataset.d||td(viewDate));
    const rec=(await loadRecs(d)).find(r=>r._id===id);if(!rec)return;
    if(act==='del')openDialog(`删除 ${rec.type==='expense'?rec.category:rec.service} ${rec.amount}？`,async()=>{await delRec(d,id);renderHome();});
    else{editMode=true;editId=id;editDate=d;form={...rec};fstep=1;openForm();}
  }));
}

// ── FORM ──
function openForm(){
  if(!editMode){editMode=false;editId=null;editDate=null;form={type:'',service:'',customer:'',category:'',note:'',amount:'',payment:''};}
  q('formSheet').classList.add('open');renderFormSheet();
}
function closeForm(){q('formSheet').classList.remove('open');setTimeout(()=>{q('sheetBody').innerHTML='';},320);}
q('sheetBg').addEventListener('click',closeForm);
const isInc=()=>form.type==='income';
function mkProg(cur,tot){return '<div class="step-prog">'+Array.from({length:tot},(_,i)=>`<div class="sp${i<cur?' on':''}"></div>`).join('')+'</div>';}
function confirmCard(){
  const rows=isInc()?[['服务',form.service],['客人',form.customer],['金额',form.amount],['付款',form.payment]]:[['类别',form.category],['金额',form.amount],['付款',form.payment]];
  return`<div class="confirm-card">${rows.map(([l,v])=>`<div class="cc-row"><span class="cc-l">${l}</span><span class="cc-v">${v}</span></div>`).join('')}</div>`;
}
function renderFormSheet(){
  const sb=q('sheetBody');
  const hdr=`<div class="sheet-handle"></div><div class="sheet-hdr">${fstep>0?'<button class="back-link" id="fBk">← 上一步</button>':'<div></div>'}<button class="close-btn" id="fCx">×</button></div>`;
  let body='';
  if(fstep===0){body=`<div class="step-q">选择类型</div><div class="step-title">这笔是？</div><div class="type-grid"><div class="type-card ${form.type==='income'?'sel-inc':''}" id="tInc"><div class="tc-i">💰</div><div class="tc-l">收入</div><div class="tc-s">服务收款</div></div><div class="type-card ${form.type==='expense'?'sel-exp':''}" id="tExp"><div class="tc-i">💸</div><div class="tc-l">支出</div><div class="tc-s">材料·租金·其他</div></div></div>`;}
  else if(isInc()){
    if(fstep===1)body=`${mkProg(1,5)}<div class="step-q">Step 1 · 服务类型</div><div class="step-title">做了什么？</div><div class="choice-row"><div class="choice${form.service==='Full Set'?' on':''}" data-cls="svc" data-v="Full Set"><div class="c-main">Full Set</div><div class="c-sub">全套</div></div><div class="choice${form.service==='Refill'?' on':''}" data-cls="svc" data-v="Refill"><div class="c-main">Refill</div><div class="c-sub">补睫</div></div></div>`;
    else if(fstep===2)body=`${mkProg(2,5)}<div class="step-q">Step 2 · 客人类型</div><div class="step-title">新客还是回头客？</div><div class="choice-row"><div class="choice${form.customer==='New'?' on':''}" data-cls="cu" data-v="New"><div class="c-main">New 新客</div><div class="c-sub">第一次</div></div><div class="choice${form.customer==='Returning'?' on':''}" data-cls="cu" data-v="Returning"><div class="c-main">Returning</div><div class="c-sub">回头客</div></div></div>`;
    else if(fstep===3){const sc=form.amount&&!AMTS_INC.map(a=>'$'+a).includes(form.amount);body=`${mkProg(3,5)}<div class="step-q">Step 3 · 金额</div><div class="step-title">收了多少？</div><div class="amt-grid">${AMTS_INC.map(a=>`<div class="amt-pill${form.amount==='$'+a?' on':''}" data-cls="amt" data-v="$${a}">$${a}</div>`).join('')}<div class="amt-pill${sc?' on':''}" id="ctog">自定义</div></div><div id="cbox" style="display:${sc?'flex':'none'}" class="custom-row"><input class="amt-input" type="number" id="cAmt" placeholder="金额" value="${sc?amtN(form.amount):''}"/><button class="big-btn primary" style="width:auto;padding:13px 16px;margin-top:0" id="cOk">✓</button></div>`;}
    else if(fstep===4)body=`${mkProg(4,5)}<div class="step-q">Step 4 · 付款</div><div class="step-title">怎么付的？</div><div class="pay-row">${PAYS.map(p=>`<div class="pay-btn${form.payment===p?' on':''}" data-cls="pay" data-v="${p}"><div class="pb-m">${p}</div><div class="pb-s">${PAY_CN[p]}</div></div>`).join('')}</div>`;
    else if(fstep===5)body=`${mkProg(5,5)}<div class="step-title">确认收入</div>${confirmCard()}<button class="big-btn primary" id="subBtn">${editMode?'✓ 保存修改':'✓ 提交'}</button><button class="big-btn ghost" id="reBtn">重新填写</button>`;
  }else{
    if(fstep===1)body=`${mkProg(1,4)}<div class="step-q">Step 1 · 类别</div><div class="step-title">花在哪里？</div><div class="cat-list">${CATS.map(([ic,c])=>`<div class="cat-item${form.category===c?' on':''}" data-cls="cat" data-v="${c}">${ic} ${c}</div>`).join('')}</div>`;
    else if(fstep===2){const sc=form.amount&&!AMTS_EXP.map(a=>'$'+a).includes(form.amount);body=`${mkProg(2,4)}<div class="step-q">Step 2 · 金额</div><div class="step-title">花了多少？</div><div class="amt-grid">${AMTS_EXP.map(a=>`<div class="amt-pill${form.amount==='$'+a?' on':''}" data-cls="amt" data-v="$${a}">$${a}</div>`).join('')}<div class="amt-pill${sc?' on':''}" id="ctog">自定义</div></div><div id="cbox" style="display:${sc?'flex':'none'}" class="custom-row"><input class="amt-input" type="number" id="cAmt" placeholder="金额" value="${sc?amtN(form.amount):''}"/><button class="big-btn primary" style="width:auto;padding:13px 16px;margin-top:0" id="cOk">✓</button></div>`;}
    else if(fstep===3)body=`${mkProg(3,4)}<div class="step-q">Step 3 · 付款</div><div class="step-title">怎么付的？</div><div class="pay-row">${PAYS.map(p=>`<div class="pay-btn${form.payment===p?' on':''}" data-cls="pay" data-v="${p}"><div class="pb-m">${p}</div><div class="pb-s">${PAY_CN[p]}</div></div>`).join('')}</div>`;
    else if(fstep===4)body=`${mkProg(4,4)}<div class="step-title">确认支出</div>${confirmCard()}<div style="margin-bottom:12px"><div style="font-size:11px;color:#bbb;margin-bottom:6px">备注（选填）</div><textarea class="note-input" id="noteIn" placeholder="例：购入散毛">${form.note||''}</textarea></div><button class="big-btn primary" id="subBtn">${editMode?'✓ 保存修改':'✓ 提交'}</button><button class="big-btn ghost" id="reBtn">重新填写</button>`;
  }
  if(fstep===99)body=`<div class="success-view"><div class="ok-circle">✓</div><div class="ok-amt" style="color:${isInc()?'var(--dk)':'var(--red)'}">${isInc()?'':'-'}${form.amount}</div><div class="ok-sub">${isInc()?form.service+' · '+form.customer:form.category} · ${form.payment}</div>${!editMode?'<button class="big-btn primary" id="moreBtn">继续记录</button>':''}<button class="big-btn ghost" id="doneBtn">完成</button></div>`;
  sb.innerHTML=hdr+body;
  if(q('fCx'))q('fCx').onclick=closeForm;
  if(q('fBk'))q('fBk').onclick=()=>{fstep--;renderFormSheet();};
  if(q('tInc'))q('tInc').onclick=()=>{form.type='income';fstep=1;renderFormSheet();};
  if(q('tExp'))q('tExp').onclick=()=>{form.type='expense';fstep=1;renderFormSheet();};
  sb.querySelectorAll('[data-cls="svc"]').forEach(el=>el.addEventListener('click',function(){form.service=this.dataset.v;fstep++;renderFormSheet();}));
  sb.querySelectorAll('[data-cls="cu"]').forEach(el=>el.addEventListener('click',function(){form.customer=this.dataset.v;fstep++;renderFormSheet();}));
  sb.querySelectorAll('[data-cls="cat"]').forEach(el=>el.addEventListener('click',function(){form.category=this.dataset.v;fstep++;renderFormSheet();}));
  sb.querySelectorAll('[data-cls="amt"]').forEach(el=>el.addEventListener('click',function(){form.amount=this.dataset.v;fstep++;renderFormSheet();}));
  sb.querySelectorAll('[data-cls="pay"]').forEach(el=>el.addEventListener('click',function(){form.payment=this.dataset.v;fstep++;renderFormSheet();}));
  if(q('ctog'))q('ctog').onclick=()=>{q('ctog').style.display='none';q('cbox').style.display='flex';q('cAmt').focus();};
  if(q('cOk'))q('cOk').onclick=()=>{const v=q('cAmt').value;if(v){form.amount='$'+v;fstep++;renderFormSheet();}};
  if(q('subBtn'))q('subBtn').onclick=async function(){
    this.disabled=true;this.textContent='保存中...';
    if(q('noteIn'))form.note=q('noteIn').value;
    const rec={...form,date:td(viewDate),_d:td(viewDate),time:nowT()};
    if(gsUrl){try{await fetch(gsUrl+'?'+new URLSearchParams(rec).toString(),{mode:'no-cors'});}catch{}}
    if(editMode)await updRec(editDate,editId,rec);else await addRec(viewDate,rec);
    fstep=99;editMode=false;renderFormSheet();renderHome();
  };
  if(q('reBtn'))q('reBtn').onclick=()=>{fstep=1;renderFormSheet();};
  if(q('moreBtn'))q('moreBtn').onclick=()=>{form={type:'',service:'',customer:'',category:'',note:'',amount:'',payment:''};fstep=0;renderFormSheet();};
  if(q('doneBtn'))q('doneBtn').onclick=closeForm;
}

// ── STATS ──
function barRows(items){const mx=Math.max(...items.map(i=>i.v),1);return items.map(i=>`<div class="bar-row"><div class="bar-lbl">${i.l}</div><div class="bar-track"><div class="bar-fill" style="width:${(i.v/mx*100).toFixed(1)}%;background:${i.c}"></div></div><div class="bar-num">${i.v}</div></div>`).join('');}
function svgBar(data){if(!data.length)return'<p style="color:#ccc;text-align:center;font-size:11px;padding:10px 0">暂无数据</p>';const mx=Math.max(...data.map(d=>d.v),1),W=300,H=86,p=10,bw=Math.min(26,(W-p*2)/data.length-4),gap=(W-p*2)/data.length;let r='',t='',l='';data.forEach((d,i)=>{const bh=Math.max((d.v/mx)*(H-26),d.v?2:0),x=p+i*gap+gap/2-bw/2,y=H-16-bh;r+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw}" height="${bh.toFixed(1)}" rx="4" fill="#A89880"/>`;if(d.v)t+=`<text x="${(x+bw/2).toFixed(1)}" y="${(y-4).toFixed(1)}" text-anchor="middle" font-size="8" fill="#A89880">${d.v}</text>`;l+=`<text x="${(x+bw/2).toFixed(1)}" y="${H-1}" text-anchor="middle" font-size="8" fill="#bbb">${d.l}</text>`;});return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;overflow:visible">${r}${t}${l}</svg>`;}
async function renderStats(){
  let s,e;const sp=document.querySelector('.per-tab2.on')?.dataset.p||'week';
  if(sp==='week')[s,e]=weekRange();else if(sp==='month')[s,e]=monthRange();else if(cStart&&cEnd){s=cStart;e=cEnd;}else[s,e]=weekRange();
  const recs=await rangeRecs(s,e),incR=recs.filter(r=>r.type!=='expense');
  const{inc:ti,exp:te,cash,emt,rmb}=calcTotals(recs);
  let fs=0,rf=0,nw=0,rt=0;incR.forEach(r=>{if(r.service==='Full Set')fs++;else rf++;if(r.customer==='New')nw++;else rt++;});
  const expByCat={};CATS.forEach(([,c])=>expByCat[c]=0);recs.filter(r=>r.type==='expense').forEach(r=>{expByCat[r.category||'其他']=(expByCat[r.category||'其他']||0)+amtN(r.amount);});
  let cd=[];
  if(sp==='week'){const d=new Date(s);while(d<=e){const k=td(new Date(d));cd.push({l:DAYS[d.getDay()],v:recs.filter(r=>r._d===k).length});d.setDate(d.getDate()+1);}
  }else{const wm={};recs.forEach(r=>{const pd=parseD(r._d),dy=pd.getDay(),df=dy===0?-6:1-dy,mon=new Date(pd.getFullYear(),pd.getMonth(),pd.getDate()+df),k=td(mon);wm[k]=(wm[k]||0)+1;});const d=new Date(s),dy=d.getDay(),df=dy===0?-6:1-dy;d.setDate(d.getDate()+df);while(d<=e){cd.push({l:`${d.getMonth()+1}/${d.getDate()}`,v:wm[td(new Date(d))]||0});d.setDate(d.getDate()+7);}}
  const expRows=Object.entries(expByCat).filter(([,v])=>v>0).map(([l,v])=>({l,v,c:'var(--red)'}));
  q('statsContent').innerHTML=`<div style="font-size:10px;color:var(--tpl);text-align:center;margin-bottom:10px;letter-spacing:.05em">${fmtD(s)}${td(s)===td(e)?'':' → '+fmtD(e)}</div>
    <div class="kpi-row"><div class="kpi"><div class="kpi-v" style="color:var(--grn)">${fmt$(ti)}</div><div class="kpi-l">总收入</div></div><div class="kpi"><div class="kpi-v" style="color:var(--red)">${fmt$(te)}</div><div class="kpi-l">总支出</div></div><div class="kpi"><div class="kpi-v">${fmt$(ti-te)}</div><div class="kpi-l">结余</div></div></div>
    <div class="kpi-row"><div class="kpi"><div class="kpi-v">${fmt$(cash)}</div><div class="kpi-l">Cash</div></div><div class="kpi"><div class="kpi-v">${fmt$(emt)}</div><div class="kpi-l">EMT</div></div><div class="kpi"><div class="kpi-v">¥${rmb.toFixed(0)}</div><div class="kpi-l">RMB</div></div></div>
    <div class="stat-card"><div class="stat-card-title">服务类型</div>${incR.length?barRows([{l:'Full Set',v:fs,c:'#2C2520'},{l:'Refill',v:rf,c:'#A89880'}]):'<p style="color:#ccc;font-size:11px;text-align:center">暂无</p>'}</div>
    <div class="stat-card"><div class="stat-card-title">客人类型</div>${incR.length?barRows([{l:'新客',v:nw,c:'#7A9B76'},{l:'回头客',v:rt,c:'#A89880'}]):'<p style="color:#ccc;font-size:11px;text-align:center">暂无</p>'}</div>
    ${expRows.length?`<div class="stat-card"><div class="stat-card-title">支出分类</div>${barRows(expRows)}</div>`:''}
    <div class="stat-card"><div class="stat-card-title">${sp==='week'?'本周每日':'每周'}客人数</div>${svgBar(cd)}</div>`;
}

// ── BALANCE SHEET ──
async function renderLedger(){
  q('ledMth').textContent=mthLabel(ledDate);
  const recs=await monthRecs(ledDate);
  const{inc,exp,cash,emt,rmb,bal,bySvc,byCat}=calcTotals(recs);
  const now=new Date();
  const periodStr=`${mthLabel(ledDate)}`;

  if(!recs.length){
    q('bsContent').innerHTML=`<div class="bs-wrap"><div class="bs-header"><div class="bs-company">Bunny Beauty Studio</div><div class="bs-title">Income Statement</div><div class="bs-period">${periodStr}</div></div><div class="bs-empty"><div class="ei">📋</div><p>本月暂无记录</p></div></div>`;
    return;
  }

  // Income rows
  const incRows=Object.entries(bySvc).map(([k,v])=>`<div class="bs-row"><span class="bs-lbl indent">${k}</span><span class="bs-val">${fmt$(v)}</span></div>`).join('');
  // Payment breakdown
  const payBreak=`<div class="pay-breakdown"><div class="pb-chip">Cash <span>${fmt$(cash)}</span></div><div class="pb-chip">EMT <span>${fmt$(emt)}</span></div><div class="pb-chip">RMB <span>¥${rmb.toFixed(2)}</span></div></div>`;
  // Expense rows
  const expRows=exp>0?Object.entries(byCat).filter(([,v])=>v>0).map(([k,v])=>`<div class="bs-row"><span class="bs-lbl indent">${k}</span><span class="bs-val" style="color:var(--red)">${fmt$(v)}</span></div>`).join(''):'<div class="bs-row"><span class="bs-lbl indent" style="color:#ccc;font-style:italic">暂无支出</span><span class="bs-val" style="color:#ccc">—</span></div>';

  q('bsContent').innerHTML=`<div class="bs-wrap">
    <div class="bs-header">
      <div class="bs-company">Bunny Beauty Studio</div>
      <div class="bs-title">Income &amp; Expense Statement</div>
      <div class="bs-period">${periodStr} · As of ${now.getDate()} ${MS[now.getMonth()]} ${now.getFullYear()}</div>
    </div>

    <div class="bs-section">
      <div class="bs-section-title">INCOME &nbsp;收入</div>
      ${incRows}
      <div class="bs-subtotal"><span class="bs-lbl">Total Income &nbsp;总收入</span><span class="bs-val">${fmt$(inc)}</span></div>
      ${payBreak}
    </div>

    <div class="bs-divider"></div>

    <div class="bs-section">
      <div class="bs-section-title">EXPENSES &nbsp;支出</div>
      ${expRows}
      <div class="bs-subtotal"><span class="bs-lbl">Total Expenses &nbsp;总支出</span><span class="bs-val" style="color:var(--red)">${fmt$(exp)}</span></div>
    </div>

    <div class="bs-divider"></div>

    <div class="bs-total">
      <span class="bs-lbl">NET BALANCE &nbsp;结余</span>
      <span class="bs-val ${bal>=0?'pos':'neg'}">${bal>=0?'':'-'}${fmt$(Math.abs(bal))}</span>
    </div>

    <div class="bs-section" style="margin-top:14px">
      <div class="bs-section-title">PAYMENT SUMMARY &nbsp;收款汇总</div>
      <div class="bs-row"><span class="bs-lbl indent">Cash 现金</span><span class="bs-val">${fmt$(cash)}</span></div>
      <div class="bs-row"><span class="bs-lbl indent">EMT 转账</span><span class="bs-val">${fmt$(emt)}</span></div>
      <div class="bs-row"><span class="bs-lbl indent">RMB 人民币</span><span class="bs-val">¥${rmb.toFixed(2)}</span></div>
      <div class="bs-subtotal"><span class="bs-lbl">Total CAD Received</span><span class="bs-val">${fmt$(cash+emt)}</span></div>
    </div>

    <div class="bs-note">Bunny Beauty Studio · ${periodStr} · ${recs.length} transactions</div>
  </div>`;
}

// Excel export
q('dlBtn').addEventListener('click',async()=>{
  const recs=await monthRecs(ledDate);const{inc,exp,bal,cash,emt,rmb}=calcTotals(recs);
  const sorted=[...recs].sort((a,b)=>a._d.localeCompare(b._d));
  const data=[
    ['Bunny Beauty Studio','','','','',''],
    ['Income & Expense Statement','','','',`Period: ${mthLabel(ledDate)}`,''],
    ['','','','','',''],
    ['Date','Type','Item','Client/Note','Amount','Payment'],
    ...sorted.map(r=>{const ie=r.type==='expense';return[r._d,ie?'Expense':'Income',ie?(r.category||''):r.service,ie?(r.note||''):(r.customer||''),ie?-amtN(r.amount):amtN(r.amount),r.payment||''];}),
    ['','','','','',''],
    ['SUMMARY','','','','',''],
    ['Total Income','','','',inc,''],
    ['Total Expenses','','','',exp,''],
    ['Net Balance','','','',bal,''],
    ['','','','','',''],
    ['Cash','','','',cash,''],
    ['EMT','','','',emt,''],
    ['RMB','','','',rmb,'(¥)'],
  ];
  const ws=XLSX.utils.aoa_to_sheet(data);ws['!cols']=[{wch:12},{wch:8},{wch:14},{wch:14},{wch:10},{wch:8}];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,mthLabel(ledDate));
  const arr=XLSX.write(wb,{type:'array',bookType:'xlsx'});
  const blob=new Blob([arr],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`BunnyBeauty_${ledDate.getFullYear()}-${pad(ledDate.getMonth()+1)}.xlsx`;a.click();
});

// Sheets sync
q('syncBtn').addEventListener('click',async()=>{
  if(!gsUrl){alert('请先在设置中填入 Google Apps Script URL');return;}
  const recs=await monthRecs(ledDate);
  q('syncBtn').textContent='同步中...';
  let ok=0;
  for(const r of recs){try{await fetch(gsUrl+'?'+new URLSearchParams(r).toString(),{mode:'no-cors'});ok++;}catch{}}
  q('syncBtn').textContent=`✓ ${ok}条`;setTimeout(()=>{q('syncBtn').textContent='☁ Sheets';},2000);
});
