<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Bunny Beauty · 记账本</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--tp:#A89880;--tpl:#C4B5A2;--cr:#F5F0EA;--dk:#2C2520;--wh:#fff}
html,body{height:100%;background:var(--tp)}
#root{font-family:'Noto Sans SC',sans-serif;max-width:390px;margin:0 auto;height:100vh;display:flex;flex-direction:column;overflow:hidden;background:var(--tp)}
#hdr{padding:1rem 1.2rem .6rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.lm{width:34px;height:34px;border:1px solid rgba(255,255,255,.4);border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.1;flex-shrink:0}
.l1{font-size:7px;letter-spacing:.1em;opacity:.7;font-family:'Playfair Display',serif;color:#fff;display:block}
.l2{font-size:12px;font-family:'Playfair Display',serif;font-weight:500;color:#fff;display:block}
.brand{font-family:'Playfair Display',serif;font-size:15px;font-weight:400;color:#fff;margin-left:8px}
.brand small{display:block;font-size:9px;letter-spacing:.12em;opacity:.6;text-transform:uppercase;font-family:'Noto Sans SC',sans-serif;margin-top:1px}
.gear{background:none;border:1px solid rgba(255,255,255,.3);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.7);font-size:13px;flex-shrink:0}
.pg{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.pg.gone{display:none!important}
.date-nav{display:flex;align-items:center;justify-content:space-between;padding:.2rem 1.2rem .7rem;color:#fff;flex-shrink:0}
.date-nav button{background:none;border:none;color:rgba(255,255,255,.55);font-size:22px;cursor:pointer;padding:2px 10px;line-height:1}
.dcenter .d{font-family:'Playfair Display',serif;font-size:17px;color:#fff;text-align:center}
.dcenter .ds{font-size:10px;letter-spacing:.1em;opacity:.6;text-transform:uppercase;margin-top:2px;text-align:center}
.sumbar{display:flex;gap:7px;padding:0 1.2rem 1.1rem;flex-shrink:0}
.smc{flex:1;background:rgba(255,255,255,.15);border-radius:11px;padding:.5rem .35rem;text-align:center}
.sml{font-size:9px;letter-spacing:.07em;color:rgba(255,255,255,.6);text-transform:uppercase;margin-bottom:2px}
.smv{font-size:13px;font-weight:500;color:#fff;font-family:'Playfair Display',serif}
.rec-area{background:#fff;border-radius:22px 22px 0 0;flex:1;overflow-y:auto;padding:1.25rem 1.2rem 5rem}
.empty{text-align:center;padding:3rem 0;color:#ccc}
.empty p{font-family:'Playfair Display',serif;font-style:italic;font-size:15px;margin-bottom:4px}
.empty small{font-size:10px;letter-spacing:.1em;text-transform:uppercase}
/* Record row */
.rec{display:flex;align-items:center;padding:11px 0;border-bottom:.5px solid #F0EBE4;gap:8px}
.rec:last-child{border:none}
.rec-main{flex:1;min-width:0}
.rtitle{font-size:14px;font-weight:500;color:var(--dk)}
.rsub{font-size:11px;color:#bbb;margin-top:2px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.tag{display:inline-block;padding:1px 7px;border-radius:20px;font-size:9px;letter-spacing:.05em;text-transform:uppercase}
.tc{background:#EAF0E4;color:#5A7A45}.te{background:#E4EAF0;color:#45607A}.tr{background:#F0EAE4;color:#7A6045}.tn{background:#F0E4F0;color:#7A457A}
.ramt{font-family:'Playfair Display',serif;font-size:16px;color:var(--dk);white-space:nowrap}
.rec-actions{display:flex;gap:4px;flex-shrink:0}
.ract{width:28px;height:28px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;transition:all .15s}
.ract-e{background:#F5F0EA;color:var(--tp)}
.ract-d{background:#FFF0F0;color:#c0392b}
/* FAB */
#fab{position:fixed;bottom:66px;left:50%;transform:translateX(-50%);background:var(--dk);color:#fff;border:none;border-radius:50px;padding:12px 26px;font-size:14px;font-weight:500;font-family:'Noto Sans SC',sans-serif;cursor:pointer;letter-spacing:.05em;box-shadow:0 4px 18px rgba(0,0,0,.25);z-index:5;white-space:nowrap}
/* Nav */
#nav{display:flex;background:#fff;border-top:.5px solid #EEE;flex-shrink:0;z-index:4}
.ntab{flex:1;padding:.7rem;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;background:none;border:none;font-family:'Noto Sans SC',sans-serif}
.ntab-i{font-size:17px;line-height:1}
.ntab-l{font-size:10px;letter-spacing:.05em;color:#bbb}
.ntab.on .ntab-l{color:var(--tp)}
/* Form */
#formPg{background:#fff;overflow-y:auto}
.fi{padding:1.5rem 1.5rem 3rem;max-width:390px;margin:0 auto}
.form-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.4rem}
.bk{background:none;border:none;color:#bbb;font-size:11px;cursor:pointer;padding:0;display:flex;align-items:center;gap:4px;font-family:'Noto Sans SC',sans-serif}
.cancel-x{background:none;border:none;color:#ccc;font-size:20px;cursor:pointer;padding:0;line-height:1}
.prog{display:flex;gap:5px;justify-content:center;margin-bottom:1.4rem}
.dot{width:5px;height:5px;border-radius:50%;background:#D5C9BE;transition:all .3s}
.dot.on{background:var(--tp);width:14px;border-radius:3px}
.slbl{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--tpl);text-align:center;margin-bottom:.3rem}
h2{font-family:'Playfair Display',serif;font-size:21px;font-weight:400;color:var(--dk);text-align:center;margin-bottom:1.2rem}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}
.pill{padding:15px;border-radius:50px;border:1px solid #E0D8D0;background:#fff;text-align:center;font-size:14px;color:var(--dk);cursor:pointer;font-family:'Noto Sans SC',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px;user-select:none;transition:all .12s;width:100%}
.pill:active,.pill.sel{background:var(--tp);color:#fff;border-color:var(--tp)}
.en{font-size:10px;opacity:.45;font-family:'Playfair Display',serif;font-style:italic}
.g2 .pill{margin-bottom:0}
.agt{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.ap{padding:14px 4px;border-radius:40px;border:1px solid #E0D8D0;background:#fff;text-align:center;font-size:14px;font-weight:500;color:var(--dk);cursor:pointer;user-select:none;transition:all .12s}
.ap:active,.ap.sel{background:var(--tp);color:#fff;border-color:var(--tp)}
.cta{width:100%;padding:15px;border-radius:50px;font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:'Noto Sans SC',sans-serif;letter-spacing:.04em;display:block;margin-top:4px}
.cta-p{background:var(--dk);color:#fff}
.cta-p:disabled{opacity:.35}
.cta-g{background:transparent;color:#bbb;border:1px solid #E0D8D0;margin-top:8px}
input{width:100%;padding:13px 18px;border-radius:50px;border:1px solid #E0D8D0;font-size:15px;color:var(--dk);background:#fff;outline:none;font-family:'Noto Sans SC',sans-serif;margin-bottom:10px;-webkit-appearance:none;appearance:none}
input:focus{border-color:var(--tp)}
.ok-ring{width:54px;height:54px;border-radius:50%;border:1.5px solid var(--tp);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;color:var(--tp);font-size:20px}
.err{color:#c0392b;font-size:11px;text-align:center;margin-top:6px}
/* Confirm dialog */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:20;align-items:flex-end;justify-content:center}
.overlay.show{display:flex}
.dlg{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:390px;padding:1.5rem 1.5rem 2rem}
.dlg h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:400;color:var(--dk);margin-bottom:.5rem}
.dlg p{font-size:13px;color:#aaa;margin-bottom:1.25rem}
.dlg-btns{display:flex;gap:10px}
.dlg-btns button{flex:1;padding:13px;border-radius:50px;font-size:14px;font-family:'Noto Sans SC',sans-serif;cursor:pointer;border:none}
.dlg-cancel{background:#F5F0EA;color:var(--dk)}
.dlg-confirm{background:#c0392b;color:#fff}
/* Stats */
#statsPg{background:var(--cr);overflow-y:auto;padding:1rem 1.1rem 5rem;flex:1}
.ptabs{display:flex;background:#fff;border-radius:50px;padding:4px;margin-bottom:1rem;gap:4px}
.ptab{flex:1;padding:9px 4px;border-radius:50px;border:none;background:transparent;font-size:12px;font-family:'Noto Sans SC',sans-serif;color:#bbb;cursor:pointer;letter-spacing:.04em;transition:all .2s}
.ptab.on{background:var(--dk);color:#fff}
.crange{display:flex;gap:7px;align-items:center;margin-bottom:1rem;flex-wrap:wrap}
.crange input{flex:1;min-width:0;padding:9px 14px;border-radius:50px;border:1px solid #E0D8D0;font-size:12px;color:var(--dk);background:#fff;outline:none;font-family:'Noto Sans SC',sans-serif;-webkit-appearance:none;margin-bottom:0}
.crange button{padding:9px 14px;border-radius:50px;background:var(--dk);color:#fff;border:none;font-size:12px;font-family:'Noto Sans SC',sans-serif;cursor:pointer;white-space:nowrap}
.scard{background:#fff;border-radius:16px;padding:1.1rem;margin-bottom:.9rem}
.stitle{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--tpl);margin-bottom:.9rem}
.krow{display:flex;gap:8px;margin-bottom:.8rem}
.kpi{flex:1;background:#fff;border-radius:14px;padding:.9rem .6rem;text-align:center}
.kpi-v{font-family:'Playfair Display',serif;font-size:22px;color:var(--dk);line-height:1}
.kpi-l{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:#bbb;margin-top:4px}
.brow{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.brow:last-child{margin-bottom:0}
.blbl{font-size:12px;color:var(--dk);width:60px;flex-shrink:0}
.btrack{flex:1;background:#F0EBE4;border-radius:4px;height:7px;overflow:hidden}
.bfill{height:100%;border-radius:4px;transition:width .6s ease}
.bnum{font-size:12px;color:#bbb;width:28px;text-align:right;flex-shrink:0}
</style>
</head>
<body>
<div id="root">
  <div id="hdr">
    <div style="display:flex;align-items:center;gap:8px">
      <div class="lm"><span class="l1">00</span><span class="l2">BB</span></div>
      <div class="brand">Bunny Beauty<small>记账本</small></div>
    </div>
    <button class="gear" id="gearBtn">⚙</button>
  </div>
  <div id="homePg" class="pg">
    <div class="date-nav">
      <button id="prevDay">‹</button>
      <div class="dcenter"><div class="d" id="dDisp"></div><div class="ds" id="dSub"></div></div>
      <button id="nextDay">›</button>
    </div>
    <div class="sumbar" id="sumbar"></div>
    <div class="rec-area" id="recList"></div>
  </div>
  <div id="formPg" class="pg gone"><div class="fi" id="fi"></div></div>
  <div id="statsPg" class="pg gone">
    <div class="ptabs">
      <button class="ptab on" data-p="week">本周</button>
      <button class="ptab" data-p="month">本月</button>
      <button class="ptab" data-p="custom">自定义</button>
    </div>
    <div class="crange" id="crange" style="display:none">
      <input type="date" id="cStart"/>
      <span style="color:#ccc;font-size:13px">→</span>
      <input type="date" id="cEnd"/>
      <button id="cQuery">查询</button>
    </div>
    <div id="sc"></div>
  </div>
  <div id="nav">
    <button class="ntab on" data-pg="homePg"><div class="ntab-i">📒</div><div class="ntab-l">记账</div></button>
    <button class="ntab" data-pg="statsPg"><div class="ntab-i">📊</div><div class="ntab-l">统计</div></button>
  </div>
</div>
<button id="fab">＋ 新增记录</button>

<!-- Delete confirm dialog -->
<div class="overlay" id="dlgOverlay">
  <div class="dlg">
    <h3>删除记录</h3>
    <p id="dlgDesc">确定要删除这条记录吗？</p>
    <div class="dlg-btns">
      <button class="dlg-cancel" id="dlgCancel">取消</button>
      <button class="dlg-confirm" id="dlgConfirm">删除</button>
    </div>
  </div>
</div>

<script>
const AMTS=[20,40,45,50,60];
let gsUrl='',fstep=1,statPer='week',editMode=false,editRecId=null,editRecDate=null;
let viewDate=new Date(),cStart=null,cEnd=null,pendingDeleteCb=null;
let form={date:'',service:'',customer:'',amount:'',payment:''};
const q=id=>document.getElementById(id);
const MS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS=['日','一','二','三','四','五','六'];

function lsGet(k){try{return localStorage.getItem(k);}catch{return null;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch{}}
function td(d=new Date()){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function parseD(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function fmtD(d){return d.getDate()+' '+MS[d.getMonth()]+' '+d.getFullYear();}
function isToday(d){return td(d)===td();}
function dKey(d){return 'bunny:rec:'+td(d);}
function nowT(){const n=new Date();return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
function amtN(s){return parseFloat((s||'').replace('$','').replace('¥',''))||0;}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

function loadRecs(d){try{const r=lsGet(dKey(d));return r?JSON.parse(r):[];}catch{return[];}}
function saveRecs(d,recs){lsSet(dKey(d),JSON.stringify(recs));}
function addRec(d,rec){const recs=loadRecs(d);recs.push({...rec,_id:uid()});saveRecs(d,recs);}
function updateRec(d,id,rec){const recs=loadRecs(d).map(r=>r._id===id?{...rec,_id:id}:r);saveRecs(d,recs);}
function deleteRec(d,id){const recs=loadRecs(d).filter(r=>r._id!==id);saveRecs(d,recs);}

function getRangeRecs(s,e){
  const all=[],d=new Date(s.getFullYear(),s.getMonth(),s.getDate()),end=new Date(e.getFullYear(),e.getMonth(),e.getDate());
  while(d<=end){loadRecs(new Date(d)).forEach(r=>all.push({...r,_d:td(new Date(d))}));d.setDate(d.getDate()+1);}
  return all;
}
function weekRange(d=new Date()){
  const day=d.getDay(),diff=day===0?-6:1-day;
  const mon=new Date(d.getFullYear(),d.getMonth(),d.getDate()+diff);
  return[mon,new Date(mon.getFullYear(),mon.getMonth(),mon.getDate()+6)];
}
function monthRange(d=new Date()){
  return[new Date(d.getFullYear(),d.getMonth(),1),new Date(d.getFullYear(),d.getMonth()+1,0)];
}

function nav(pg){
  document.querySelectorAll('.pg').forEach(p=>p.classList.toggle('gone',p.id!==pg));
  q('nav').style.display=pg==='formPg'?'none':'flex';
  q('fab').style.display=pg==='homePg'?'block':'none';
  document.querySelectorAll('.ntab').forEach(t=>t.classList.toggle('on',t.dataset.pg===pg));
  if(pg==='homePg')renderHome();
  if(pg==='statsPg')renderStats();
}

// ---- CONFIRM DIALOG ----
function confirm(desc,cb){
  q('dlgDesc').textContent=desc;
  q('dlgOverlay').classList.add('show');
  pendingDeleteCb=cb;
}
q('dlgCancel').onclick=()=>q('dlgOverlay').classList.remove('show');
q('dlgConfirm').onclick=()=>{q('dlgOverlay').classList.remove('show');if(pendingDeleteCb)pendingDeleteCb();};

// ---- HOME ----
function renderHome(){
  const recs=loadRecs(viewDate);
  q('dDisp').textContent=fmtD(viewDate);
  q('dSub').textContent=isToday(viewDate)?'今天':'历史记录';
  let cash=0,emt=0,rmb=0;
  recs.forEach(r=>{const a=amtN(r.amount);if(r.payment==='Cash')cash+=a;else if(r.payment==='EMT')emt+=a;else if(r.payment==='RMB')rmb+=a;});
  q('sumbar').innerHTML=`
    <div class="smc"><div class="sml">合计</div><div class="smv">$${(cash+emt).toFixed(0)}</div></div>
    <div class="smc"><div class="sml">Cash</div><div class="smv">$${cash.toFixed(0)}</div></div>
    <div class="smc"><div class="sml">EMT</div><div class="smv">$${emt.toFixed(0)}</div></div>
    <div class="smc"><div class="sml">RMB</div><div class="smv">¥${rmb.toFixed(0)}</div></div>`;
  const tmap={Cash:'tc',EMT:'te',RMB:'tr'};
  if(!recs.length){q('recList').innerHTML='<div class="empty"><p>暂无记录</p><small>点击下方按钮新增</small></div>';return;}
  q('recList').innerHTML=[...recs].reverse().map(r=>`
    <div class="rec">
      <div class="rec-main">
        <div class="rtitle">${r.service} · ${r.customer}</div>
        <div class="rsub">${r.time||''}<span class="tag ${tmap[r.payment]||''}">${r.payment}</span>${r.customer==='New'?'<span class="tag tn">新客</span>':''}</div>
      </div>
      <div class="ramt">${r.amount}</div>
      <div class="rec-actions">
        <button class="ract ract-e" data-id="${r._id}" data-action="edit" title="修改">✏️</button>
        <button class="ract ract-d" data-id="${r._id}" data-action="del" title="删除">×</button>
      </div>
    </div>`).join('');

  q('recList').querySelectorAll('.ract').forEach(btn=>{
    btn.addEventListener('click',function(){
      const id=this.dataset.id,action=this.dataset.action;
      const rec=loadRecs(viewDate).find(r=>r._id===id);
      if(!rec)return;
      if(action==='del'){
        confirm(`删除 ${rec.service} · ${rec.amount}？`,()=>{deleteRec(viewDate,id);renderHome();});
      } else {
        openEdit(rec);
      }
    });
  });
}

// ---- FORM ----
function openForm(){
  editMode=false;editRecId=null;editRecDate=null;
  form={date:td(viewDate),service:'',customer:'',amount:'',payment:''};
  fstep=1;nav('formPg');renderForm();
}
function openEdit(rec){
  editMode=true;editRecId=rec._id;editRecDate=new Date(viewDate);
  form={date:rec.date,service:rec.service,customer:rec.customer,amount:rec.amount,payment:rec.payment};
  fstep=1;nav('formPg');renderForm();
}

function mkProg(cur,tot=5){return '<div class="prog">'+Array.from({length:tot},(_,i)=>`<div class="dot${i<cur?' on':''}"></div>`).join('')+'</div>';}

function renderForm(){
  const isFirst=fstep===1,isLast=fstep===5||fstep===6;
  let hdr=`<div class="form-hdr">`;
  if(fstep>1&&fstep<6) hdr+=`<button class="bk" id="bkb">← 上一步</button>`;
  else hdr+=`<div></div>`;
  hdr+=`<button class="cancel-x" id="cancelX">×</button></div>`;

  let body='';
  if(fstep===1){
    body=`${mkProg(1)}<div class="slbl">${editMode?'修改记录 · ':'Step 1 of 5 · '}服务类型</div><h2>服务类型</h2>
      <div class="g2">
        <div class="pill fsb${form.service==='Full Set'?' sel':''}" data-v="Full Set">Full Set <span class="en">全套</span></div>
        <div class="pill fsb${form.service==='Refill'?' sel':''}" data-v="Refill">Refill <span class="en">补睫</span></div>
      </div>`;
  }else if(fstep===2){
    body=`${mkProg(2)}<div class="slbl">Step 2 of 5 · 客人类型</div><h2>客人类型</h2>
      <div class="g2">
        <div class="pill cub${form.customer==='New'?' sel':''}" data-v="New">New <span class="en">新客</span></div>
        <div class="pill cub${form.customer==='Returning'?' sel':''}" data-v="Returning">Returning <span class="en">回头客</span></div>
      </div>`;
  }else if(fstep===3){
    const ab=AMTS.map(a=>`<div class="ap amb${form.amount==='$'+a?' sel':''}" data-v="$${a}">$${a}</div>`).join('')+`<div class="ap${!AMTS.includes(amtN(form.amount))&&form.amount?' sel':''}" id="ctog">自定义</div>`;
    const showCustom=form.amount&&!AMTS.map(a=>'$'+a).includes(form.amount);
    body=`${mkProg(3)}<div class="slbl">Step 3 of 5 · 金额</div><h2>服务金额</h2>
      <div class="agt">${ab}</div>
      <div id="cbox" style="display:${showCustom?'block':'none'}">
        <input type="number" id="camt" placeholder="输入金额" value="${showCustom?amtN(form.amount):''}"/>
        <button class="cta cta-p" id="cconf">确认</button>
      </div>`;
  }else if(fstep===4){
    body=`${mkProg(4)}<div class="slbl">Step 4 of 5 · 付款方式</div><h2>付款方式</h2>
      <div class="pill pyb${form.payment==='Cash'?' sel':''}" data-v="Cash">Cash <span class="en">现金</span></div>
      <div class="pill pyb${form.payment==='EMT'?' sel':''}" data-v="EMT">EMT <span class="en">电子转账</span></div>
      <div class="pill pyb${form.payment==='RMB'?' sel':''}" data-v="RMB">RMB <span class="en">人民币</span></div>`;
  }else if(fstep===5){
    const rows=[['SERVICE',form.service],['CLIENT',form.customer],['AMOUNT',form.amount],['PAYMENT',form.payment]]
      .map(([l,v])=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:.5px solid #EAE4DC;font-size:13px"><span style="color:#bbb;font-size:11px;letter-spacing:.06em">${l}</span><span style="font-weight:500;color:var(--dk)">${v}</span></div>`).join('');
    body=`${mkProg(5)}<h2>${editMode?'确认修改':'确认信息'}</h2>
      <div style="background:var(--cr);border-radius:16px;padding:1rem 1.25rem;margin-bottom:1.1rem">${rows}</div>
      <button class="cta cta-p" id="subBtn">✓ ${editMode?'保存修改':'提交记录'}</button>
      <button class="cta cta-g" id="reBtn">重新填写</button>
      <div id="serr" class="err" style="display:none">提交失败</div>`;
  }else if(fstep===6){
    body=`<div style="text-align:center;padding:2.5rem 0">
      <div class="ok-ring">✓</div>
      <div class="slbl" style="margin-bottom:.4rem">${editMode?'修改成功':'已记录'}</div>
      <div style="font-family:'Playfair Display',serif;font-size:26px;color:var(--dk);margin-bottom:.25rem">${form.amount}</div>
      <div style="font-size:12px;color:#bbb;margin-bottom:2rem">${form.service} · ${form.customer} · ${form.payment}</div>
      ${!editMode?`<button class="cta cta-p" id="moreBtn" style="max-width:220px;margin:0 auto 8px">继续记录</button>`:''}
      <button class="cta cta-g" id="doneBtn" style="max-width:220px;margin:0 auto">完成</button>
    </div>`;
  }

  q('fi').innerHTML=hdr+body;

  if(q('cancelX'))q('cancelX').onclick=()=>nav('homePg');
  if(q('bkb'))q('bkb').onclick=()=>{fstep--;renderForm();};
  document.querySelectorAll('.fsb').forEach(el=>el.addEventListener('click',function(){form.service=this.dataset.v;fstep=2;renderForm();}));
  document.querySelectorAll('.cub').forEach(el=>el.addEventListener('click',function(){form.customer=this.dataset.v;fstep=3;renderForm();}));
  document.querySelectorAll('.amb').forEach(el=>el.addEventListener('click',function(){form.amount=this.dataset.v;fstep=4;renderForm();}));
  document.querySelectorAll('.pyb').forEach(el=>el.addEventListener('click',function(){form.payment=this.dataset.v;fstep=5;renderForm();}));
  if(q('ctog'))q('ctog').onclick=()=>{q('ctog').classList.add('sel');q('cbox').style.display='block';q('camt').focus();};
  if(q('cconf'))q('cconf').onclick=()=>{const v=q('camt').value;if(v){form.amount='$'+v;fstep=4;renderForm();}};
  if(q('subBtn'))q('subBtn').onclick=async function(){
    this.disabled=true;this.textContent='保存中...';q('serr').style.display='none';
    const rec={...form,time:nowT()};
    if(gsUrl){try{await fetch(gsUrl+'?'+new URLSearchParams(form).toString(),{mode:'no-cors'});}catch{}}
    if(editMode){updateRec(editRecDate,editRecId,rec);}
    else{addRec(viewDate,rec);}
    fstep=6;renderForm();
  };
  if(q('reBtn'))q('reBtn').onclick=()=>{fstep=1;renderForm();};
  if(q('moreBtn'))q('moreBtn').onclick=()=>{editMode=false;form={date:td(viewDate),service:'',customer:'',amount:'',payment:''};fstep=1;renderForm();};
  if(q('doneBtn'))q('doneBtn').onclick=()=>nav('homePg');
}

// ---- STATS ----
function barRows(items){
  const mx=Math.max(...items.map(i=>i.v),1);
  return items.map(i=>`<div class="brow"><div class="blbl">${i.l}</div><div class="btrack"><div class="bfill" style="width:${(i.v/mx*100).toFixed(1)}%;background:${i.c}"></div></div><div class="bnum">${i.v}</div></div>`).join('');
}
function svgBarChart(data){
  if(!data.length)return'<p style="color:#ccc;text-align:center;font-size:12px;padding:1rem 0">暂无数据</p>';
  const mx=Math.max(...data.map(d=>d.v),1),W=300,H=100,pad=10;
  const bw=Math.min(32,(W-pad*2)/data.length-5),gap=(W-pad*2)/data.length;
  let r='',t='',l='';
  data.forEach((d,i)=>{
    const bh=Math.max((d.v/mx)*(H-28),d.v?2:0),x=pad+i*gap+gap/2-bw/2,y=H-18-bh;
    r+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw}" height="${bh.toFixed(1)}" rx="3" fill="#A89880"/>`;
    if(d.v)t+=`<text x="${(x+bw/2).toFixed(1)}" y="${(y-4).toFixed(1)}" text-anchor="middle" font-size="9" fill="#A89880" font-family="sans-serif">${d.v}</text>`;
    l+=`<text x="${(x+bw/2).toFixed(1)}" y="${H-2}" text-anchor="middle" font-size="9" fill="#bbb" font-family="sans-serif">${d.l}</text>`;
  });
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;overflow:visible">${r}${t}${l}</svg>`;
}
function renderStats(){
  let s,e;
  if(statPer==='week')[s,e]=weekRange();
  else if(statPer==='month')[s,e]=monthRange();
  else if(cStart&&cEnd){s=cStart;e=cEnd;}
  else[s,e]=weekRange();
  const recs=getRangeRecs(s,e);
  let cash=0,emt=0,rmb=0,fs=0,rf=0,nw=0,rt=0;
  recs.forEach(r=>{const a=amtN(r.amount);if(r.payment==='Cash')cash+=a;else if(r.payment==='EMT')emt+=a;else if(r.payment==='RMB')rmb+=a;if(r.service==='Full Set')fs++;else if(r.service==='Refill')rf++;if(r.customer==='New')nw++;else if(r.customer==='Returning')rt++;});
  let chartData=[];
  if(statPer==='week'){
    const d=new Date(s.getFullYear(),s.getMonth(),s.getDate());
    while(d<=e){const k=td(new Date(d));chartData.push({l:DAYS[d.getDay()],v:recs.filter(r=>r._d===k).length});d.setDate(d.getDate()+1);}
  }else{
    const wmap={};
    recs.forEach(r=>{const pd=parseD(r._d),day=pd.getDay(),diff=day===0?-6:1-day;const mon=new Date(pd.getFullYear(),pd.getMonth(),pd.getDate()+diff);const k=td(mon);wmap[k]=(wmap[k]||0)+1;});
    const d=new Date(s.getFullYear(),s.getMonth(),s.getDate());const day=d.getDay(),diff2=day===0?-6:1-day;d.setDate(d.getDate()+diff2);
    while(d<=e){const k=td(new Date(d));chartData.push({l:`${d.getMonth()+1}/${d.getDate()}`,v:wmap[k]||0});d.setDate(d.getDate()+7);}
  }
  const pl=fmtD(s)+(td(s)===td(e)?'':` → ${fmtD(e)}`);
  q('sc').innerHTML=`
    <div style="font-size:11px;color:var(--tpl);letter-spacing:.06em;text-align:center;margin-bottom:.9rem">${pl}</div>
    <div class="krow"><div class="kpi"><div class="kpi-v">$${(cash+emt).toFixed(0)}</div><div class="kpi-l">CAD 收入</div></div><div class="kpi"><div class="kpi-v">${recs.length}</div><div class="kpi-l">服务次数</div></div></div>
    <div class="krow"><div class="kpi"><div class="kpi-v">$${cash.toFixed(0)}</div><div class="kpi-l">Cash</div></div><div class="kpi"><div class="kpi-v">$${emt.toFixed(0)}</div><div class="kpi-l">EMT</div></div><div class="kpi"><div class="kpi-v">¥${rmb.toFixed(0)}</div><div class="kpi-l">RMB</div></div></div>
    <div class="scard"><div class="stitle">服务类型</div>${barRows([{l:'Full Set',v:fs,c:'#2C2520'},{l:'Refill',v:rf,c:'#A89880'}])}</div>
    <div class="scard"><div class="stitle">客人类型</div>${barRows([{l:'新客 New',v:nw,c:'#7A9B76'},{l:'回头客',v:rt,c:'#A89880'}])}</div>
    <div class="scard"><div class="stitle">${statPer==='week'?'本周每日客人数':'每周客人数量'}</div>${svgBarChart(chartData)}</div>`;
}

// ---- SETTINGS ----
function openSettings(){
  nav('formPg');
  q('fi').innerHTML=`
    <div class="form-hdr"><div></div><button class="cancel-x" id="cancelX">×</button></div>
    <h2 style="margin-bottom:.5rem">设置</h2>
    <p style="font-size:12px;color:#aaa;text-align:center;margin-bottom:1.2rem">Google Apps Script URL（选填）</p>
    <input type="text" id="urlIn" placeholder="https://script.google.com/macros/s/..." value="${gsUrl}"/>
    <button class="cta cta-p" id="saveUrl">保存</button>
    <div id="uerr" class="err" style="display:none">请输入正确的 URL</div>`;
  q('cancelX').onclick=()=>nav('homePg');
  q('saveUrl').onclick=function(){
    const v=(q('urlIn').value||'').trim();
    if(v&&!v.startsWith('http')){q('uerr').style.display='block';return;}
    lsSet('bunny_gs_url',v||'');gsUrl=v;nav('homePg');
  };
}

// ---- EVENTS ----
q('gearBtn').addEventListener('click',openSettings);
q('fab').addEventListener('click',openForm);
q('prevDay').addEventListener('click',()=>{viewDate.setDate(viewDate.getDate()-1);renderHome();});
q('nextDay').addEventListener('click',()=>{viewDate.setDate(viewDate.getDate()+1);renderHome();});
document.querySelectorAll('.ntab').forEach(t=>t.addEventListener('click',function(){nav(this.dataset.pg);}));
document.querySelectorAll('.ptab').forEach(t=>t.addEventListener('click',function(){
  statPer=this.dataset.p;
  document.querySelectorAll('.ptab').forEach(p=>p.classList.toggle('on',p===this));
  q('crange').style.display=statPer==='custom'?'flex':'none';
  if(statPer!=='custom')renderStats();
}));
q('cQuery').addEventListener('click',()=>{const s=q('cStart').value,e=q('cEnd').value;if(s&&e){cStart=parseD(s);cEnd=parseD(e);renderStats();}});

gsUrl=lsGet('bunny_gs_url')||'';
nav('homePg');
</script>
